<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - IMAMA UNESA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    
    <!-- Login Form -->
    <div id="loginSection" class="login-container">
        <h2><i class="fas fa-lock"></i> Login Admin</h2>
        <input type="password" id="adminPassword" placeholder="Masukkan Password">
        <button onclick="handleLogin()" style="width: 100%;">Masuk</button>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-dashboard container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Panel Kendali IMAMA</h1>
            <button onclick="handleLogout()" class="logout-btn">Logout</button>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-cog"></i> Pengaturan Website</h3>
            <input type="text" id="setHeroTitle" placeholder="Judul Hero (Besar)">
            <input type="text" id="setHeroSubtitle" placeholder="Sub-judul Hero">
            <input type="email" id="setEmail" placeholder="Email Kontak">
            <input type="text" id="setIg" placeholder="Username Instagram">
            <button onclick="saveSettings()">Simpan Pengaturan</button>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-images"></i> Kelola Slide Hero</h3>
            <p><small>Gambar ini akan muncul bergantian di halaman depan.</small></p>
            <input type="file" id="heroImageInput" accept="image/*">
            <button onclick="uploadHeroSlide()">Tambah Slide</button>
            <div id="manageHeroSlides" class="manage-list"></div>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-info-circle"></i> Update Tentang Kami</h3>
            <textarea id="aboutInput" rows="4"></textarea>
            <button onclick="updateAbout()">Simpan Perubahan</button>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-calendar-plus"></i> Tambah Kegiatan</h3>
            <input type="text" id="eventTitle" placeholder="Judul Kegiatan">
            <input type="text" id="eventCategory" placeholder="Kategori (Contoh: Akademik)">
            <textarea id="eventDesc" placeholder="Deskripsi Kegiatan"></textarea>
            <input type="date" id="eventDate">
            <input type="file" id="eventImage" accept="image/*">
            <button onclick="addEvent()">Tambah Kegiatan</button>
            <div id="manageEvents" class="manage-list"></div>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-users"></i> Tambah Pengurus</h3>
            <input type="text" id="staffName" placeholder="Nama Lengkap">
            <input type="text" id="staffPosition" placeholder="Jabatan">
            <select id="staffDept" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
                <option value="BPH">BPH</option>
                <option value="DPM">DPM</option>
                <option value="INFOKOM">INFOKOM</option>
                <option value="DBM">DBM</option>
                <option value="EKRAF">EKRAF</option>
                <option value="DPO">DPO</option>
                <option value="KORWIL">KORWIL</option>
            </select>
            <input type="file" id="staffImage" accept="image/*">
            <button onclick="addStaff()">Tambah Pengurus</button>
            <div id="manageStaff" class="manage-list"></div>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-image"></i> Tambah Galeri</h3>
            <input type="file" id="galleryImage" accept="image/*">
            <input type="text" id="galleryCaption" placeholder="Keterangan Foto">
            <button onclick="addGallery()">Upload ke Galeri</button>
            <div id="manageGallery" class="manage-list"></div>
        </div>

        <div class="admin-card">
            <h3>Manajemen Data</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                <button onclick="exportData()" style="background: #2ecc71;"><i class="fas fa-download"></i> Download Backup (JSON)</button>
                <button onclick="document.getElementById('importFile').click()" style="background: #3498db;"><i class="fas fa-upload"></i> Import Backup</button>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
                <button onclick="clearAllData()" style="background: #e74c3c;"><i class="fas fa-trash"></i> Reset Semua Data</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
    <script type="module" src="/speed-insights.js"></script>
</body>
</html>
